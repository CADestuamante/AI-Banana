app:
  name: Banana AI
  log_level: INFO

inference:
  model_path: models/banana_yolo.pt
  device: cpu
  confidence_threshold: 0.4

input:
  source_type: camera   # camera | file
  camera_index: 0
  file_path: data/raw/sample.mp4

storage:
  history_path: data/processed/history.csv
  reports_path: reports

reporting:
  formats:
    - csv
    - xlsx
